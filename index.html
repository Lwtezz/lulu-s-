<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<style>
@import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;background:#000;}
.game{position:relative;width:100%;height:100vh;min-height:580px;overflow:hidden;font-family:'Press Start 2P',monospace;}
.bg{position:absolute;inset:0;background-size:cover;background-position:center;z-index:0;transition:filter 3s ease;}
.sky-tint{position:absolute;inset:0;z-index:1;transition:background 3s ease;pointer-events:none;}
.overlay{position:absolute;inset:0;z-index:2;background:linear-gradient(to bottom,rgba(0,0,10,0.1) 0%,rgba(0,0,10,0.0) 40%,rgba(0,0,10,0.65) 100%);pointer-events:none;}

.timebadge{position:absolute;top:16px;right:16px;z-index:20;font-size:6px;color:#f5e090;background:rgba(0,0,0,0.65);border:1px solid rgba(255,210,80,0.35);padding:5px 10px;border-radius:3px;letter-spacing:1px;white-space:nowrap;}

.stats{position:absolute;top:16px;left:16px;right:130px;display:flex;gap:7px;z-index:10;}
.stat{flex:1;background:rgba(0,0,0,0.72);border:1px solid rgba(255,210,80,0.3);border-radius:3px;padding:7px 8px;}
.sl{font-size:5px;color:#c8a060;margin-bottom:4px;display:block;letter-spacing:1px;}
.bw{background:rgba(0,0,0,0.5);height:7px;border-radius:2px;}
.sb{height:100%;border-radius:2px;transition:width 0.4s;}
.bf{background:#e8853a;}.bs{background:#7b8de8;}.bl{background:#e8527a;}
.sv{font-size:5px;color:#eee;margin-top:3px;text-align:right;display:block;}

.mood{position:absolute;top:70px;left:50%;transform:translateX(-50%);z-index:10;font-size:6px;color:#f5e090;background:rgba(0,0,0,0.68);border:1px solid rgba(255,210,80,0.3);padding:5px 14px;border-radius:3px;white-space:nowrap;}
.bub{position:absolute;top:108px;left:50%;transform:translateX(-50%);z-index:10;font-size:6px;color:#222;background:rgba(255,255,230,0.96);border:2px solid #333;border-radius:4px;padding:5px 12px;white-space:nowrap;opacity:0;transition:opacity .2s;pointer-events:none;}
.bub::after{content:'';position:absolute;bottom:-8px;left:50%;transform:translateX(-50%);border:4px solid transparent;border-top-color:#333;}
.bub.show{opacity:1;}

.fw{position:absolute;top:50%;left:50%;transform:translate(-50%,-54%);width:190px;height:190px;z-index:10;}
.face{width:100%;height:100%;object-fit:cover;object-position:center 18%;border-radius:50%;border:3px solid rgba(255,200,80,0.5);box-shadow:0 0 32px rgba(255,160,40,0.3);display:block;}

.acts{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:7px;z-index:10;}
.ab{background:rgba(5,5,20,0.85);border:2px solid rgba(255,210,80,0.35);border-radius:4px;padding:9px 8px;font-family:'Press Start 2P',monospace;font-size:6px;color:#ddd;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:5px;min-width:60px;transition:background .1s,border-color .1s;}
.ab:hover{background:rgba(255,200,80,0.2);border-color:rgba(255,210,80,0.7);}
.ab:active{transform:scale(0.95);}
.ic{font-size:18px;line-height:1;}
.ab.kiss-btn{border-color:rgba(255,100,150,0.5);}.ab.kiss-btn:hover{background:rgba(255,100,150,0.2);}
.ab.beat-btn{border-color:rgba(255,80,80,0.5);}.ab.beat-btn:hover{background:rgba(255,80,80,0.2);}
.ab.diary-btn{border-color:rgba(150,200,255,0.5);}.ab.diary-btn:hover{background:rgba(150,200,255,0.15);}

.pop{position:absolute;font-size:22px;pointer-events:none;opacity:0;top:34%;left:50%;transform:translateX(-50%);z-index:20;}
.pop.go{animation:pf .9s ease forwards;}
@keyframes pf{0%{opacity:1;transform:translateX(-50%) translateY(0) scale(.6);}100%{opacity:0;transform:translateX(-50%) translateY(-65px) scale(1.6);}}

/* diary */
.diary-modal{position:absolute;inset:0;z-index:100;background:rgba(0,0,0,0.75);display:none;align-items:center;justify-content:center;}
.diary-modal.open{display:flex;}
.diary-book{width:88%;max-width:360px;max-height:80vh;background:#1a1208;border:2px solid rgba(255,210,80,0.5);border-radius:6px;overflow:hidden;display:flex;flex-direction:column;}
.diary-header{background:rgba(0,0,0,0.5);border-bottom:1px solid rgba(255,210,80,0.3);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;}
.diary-title{font-size:7px;color:#f5e090;letter-spacing:1px;}
.diary-close{font-size:14px;color:#aaa;cursor:pointer;background:none;border:none;font-family:sans-serif;line-height:1;padding:0 4px;}
.diary-close:hover{color:#fff;}
.diary-entries{overflow-y:auto;flex:1;padding:12px;}
.diary-entries::-webkit-scrollbar{width:4px;}
.diary-entries::-webkit-scrollbar-track{background:rgba(0,0,0,0.3);}
.diary-entries::-webkit-scrollbar-thumb{background:rgba(255,210,80,0.4);border-radius:2px;}
.diary-entry{margin-bottom:14px;padding-bottom:14px;border-bottom:1px solid rgba(255,210,80,0.15);}
.diary-entry:last-child{border-bottom:none;}
.diary-date{font-size:5px;color:#c8a060;margin-bottom:6px;letter-spacing:1px;}
.diary-text{font-size:6px;color:#e8dcc0;line-height:2;letter-spacing:0.5px;}
.diary-empty{font-size:6px;color:#888;text-align:center;padding:20px;line-height:2;}

@keyframes floaty{0%,100%{transform:translate(-50%,-54%) translateY(0);}50%{transform:translate(-50%,-54%) translateY(-9px);}}
@keyframes bounce{0%,100%{transform:translate(-50%,-54%) translateY(0);}30%{transform:translate(-50%,-54%) translateY(-22px);}60%{transform:translate(-50%,-54%) translateY(-9px);}}
@keyframes shake{0%,100%{transform:translate(-50%,-54%) rotate(0);}20%{transform:translate(calc(-50% - 5px),-54%) rotate(-7deg);}40%{transform:translate(calc(-50% + 5px),-54%) rotate(7deg);}60%{transform:translate(calc(-50% - 3px),-54%) rotate(-4deg);}80%{transform:translate(calc(-50% + 3px),-54%) rotate(4deg);}}
@keyframes kpulse{0%,100%{transform:translate(-50%,-54%) scale(1);}40%{transform:translate(-50%,-54%) scale(1.12);}}
.floaty{animation:floaty 3s ease-in-out infinite;}
.bouncing{animation:bounce .55s ease!important;}
.shaking{animation:shake .45s ease!important;}
.pulsing{animation:kpulse .4s ease!important;}

.chat-fab{position:absolute;bottom:80px;right:16px;z-index:30;width:46px;height:46px;border-radius:50%;background:rgba(5,5,20,0.9);border:2px solid rgba(255,210,80,0.5);font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform .15s;box-shadow:0 0 12px rgba(255,180,40,0.2);}
.chat-fab:hover{transform:scale(1.1);border-color:rgba(255,210,80,0.9);}
.chat-modal{position:absolute;inset:0;z-index:100;background:rgba(0,0,5,0.78);display:none;align-items:flex-end;justify-content:center;padding-bottom:10px;}
.chat-modal.open{display:flex;}
.chat-box{width:94%;max-width:400px;height:72vh;background:#0d0f1a;border:2px solid rgba(255,210,80,0.35);border-radius:10px 10px 6px 6px;display:flex;flex-direction:column;overflow:hidden;}
.chat-header{background:rgba(0,0,0,0.6);border-bottom:1px solid rgba(255,210,80,0.25);padding:10px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;}
.chat-av{width:32px;height:32px;border-radius:50%;object-fit:cover;object-position:center 18%;border:1px solid rgba(255,200,80,0.4);}
.chat-name{font-size:6px;color:#f5e090;letter-spacing:1px;flex:1;}
.chat-status{font-size:5px;color:#90d090;letter-spacing:0.5px;}
.chat-close{font-size:16px;color:#aaa;cursor:pointer;background:none;border:none;font-family:sans-serif;padding:0 4px;line-height:1;}
.chat-close:hover{color:#fff;}
.chat-msgs{flex:1;overflow-y:auto;padding:12px 12px 6px;display:flex;flex-direction:column;gap:10px;}
.chat-msgs::-webkit-scrollbar{width:3px;}
.chat-msgs::-webkit-scrollbar-thumb{background:rgba(255,210,80,0.3);border-radius:2px;}
.msg-row{display:flex;gap:8px;align-items:flex-end;}
.msg-row.user{flex-direction:row-reverse;}
.msg-bubble{max-width:72%;padding:8px 10px;border-radius:10px;font-size:5.5px;line-height:1.9;}
.msg-row.bot .msg-bubble{background:rgba(30,35,60,0.95);border:1px solid rgba(100,120,255,0.25);color:#d0d8ff;border-radius:3px 10px 10px 10px;}
.msg-row.user .msg-bubble{background:rgba(255,180,40,0.18);border:1px solid rgba(255,210,80,0.3);color:#f5e8c0;border-radius:10px 3px 10px 10px;}
.msg-av{width:26px;height:26px;border-radius:50%;object-fit:cover;object-position:center 18%;border:1px solid rgba(255,200,80,0.3);flex-shrink:0;}
.user-av{background:rgba(255,180,40,0.2);display:flex;align-items:center;justify-content:center;font-size:13px;}
.typing-dot{display:inline-block;width:5px;height:5px;border-radius:50%;background:#8090d0;margin:0 2px;animation:tdot 1.2s ease-in-out infinite;}
.typing-dot:nth-child(2){animation-delay:.2s;}
.typing-dot:nth-child(3){animation-delay:.4s;}
@keyframes tdot{0%,80%,100%{transform:scale(0.6);opacity:0.4;}40%{transform:scale(1);opacity:1;}}
.chat-input-row{display:flex;gap:8px;padding:10px 12px;border-top:1px solid rgba(255,210,80,0.2);flex-shrink:0;background:rgba(0,0,0,0.4);}
.chat-input{flex:1;background:rgba(255,255,255,0.06);border:1px solid rgba(255,210,80,0.25);border-radius:4px;padding:8px 10px;font-family:"Press Start 2P",monospace;font-size:5.5px;color:#f0e8d0;outline:none;}
.chat-input:focus{border-color:rgba(255,210,80,0.6);}
.chat-send{background:rgba(255,180,40,0.2);border:1px solid rgba(255,210,80,0.4);border-radius:4px;padding:8px 12px;font-family:"Press Start 2P",monospace;font-size:5px;color:#f5e090;cursor:pointer;}
.chat-send:hover{background:rgba(255,180,40,0.35);}
.chat-send:disabled{opacity:0.4;cursor:default;}


/* SAVE INDICATOR */
.save-badge{
  position:absolute;bottom:16px;right:16px;z-index:30;
  font-size:5px;color:#90d090;
  background:rgba(0,0,0,0.65);
  border:1px solid rgba(100,220,100,0.3);
  border-radius:3px;padding:4px 8px;
  opacity:0;transition:opacity .4s;
  pointer-events:none;
  font-family:"Press Start 2P",monospace;
}
.save-badge.show{opacity:1;}


/* ACHIEVEMENT TOAST */
.ach-toast{
  position:absolute;
  top:90px;left:50%;
  transform:translateX(-50%) translateY(-10px);
  z-index:50;
  background:rgba(8,8,20,0.97);
  border:2px solid rgba(255,200,40,0.7);
  border-radius:8px;
  padding:10px 16px;
  display:flex;align-items:center;gap:10px;
  opacity:0;pointer-events:none;
  transition:opacity .35s, transform .35s;
  white-space:nowrap;
  box-shadow:0 0 24px rgba(255,180,0,0.25);
  font-family:"Press Start 2P",monospace;
}
.ach-toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.ach-toast-icon{font-size:22px;line-height:1;}
.ach-toast-info{display:flex;flex-direction:column;gap:3px;}
.ach-toast-label{font-size:5px;color:#f5b000;letter-spacing:1px;}
.ach-toast-name{font-size:6px;color:#fff;letter-spacing:0.5px;}

/* ACHIEVEMENTS MODAL */
.ach-modal{position:absolute;inset:0;z-index:100;background:rgba(0,0,0,0.78);display:none;align-items:center;justify-content:center;}
.ach-modal.open{display:flex;}
.ach-box{width:90%;max-width:380px;max-height:82vh;background:#0e0e1c;border:2px solid rgba(255,200,40,0.45);border-radius:8px;overflow:hidden;display:flex;flex-direction:column;}
.ach-header{background:rgba(0,0,0,0.5);border-bottom:1px solid rgba(255,200,40,0.25);padding:10px 14px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.ach-header-title{font-size:7px;color:#f5d060;letter-spacing:1px;}
.ach-header-count{font-size:5px;color:#aaa;}
.ach-close{font-size:16px;color:#aaa;cursor:pointer;background:none;border:none;font-family:sans-serif;padding:0 4px;line-height:1;}
.ach-close:hover{color:#fff;}
.ach-list{overflow-y:auto;flex:1;padding:12px;display:flex;flex-direction:column;gap:8px;}
.ach-list::-webkit-scrollbar{width:3px;}
.ach-list::-webkit-scrollbar-thumb{background:rgba(255,200,40,0.3);border-radius:2px;}
.ach-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:6px;border:1px solid rgba(255,200,40,0.15);background:rgba(255,200,40,0.04);}
.ach-item.unlocked{border-color:rgba(255,200,40,0.45);background:rgba(255,180,0,0.1);}
.ach-item.locked{opacity:0.4;filter:grayscale(1);}
.ach-item-icon{font-size:22px;line-height:1;flex-shrink:0;}
.ach-item-info{flex:1;}
.ach-item-name{font-size:6px;color:#f5d060;margin-bottom:3px;display:block;}
.ach-item-desc{font-size:5px;color:#aaa;line-height:1.7;}
.ach-item-badge{font-size:5px;color:#90ffb0;white-space:nowrap;}

/* achievements button */
.ab.ach-btn{border-color:rgba(255,200,40,0.5);}
.ab.ach-btn:hover{background:rgba(255,200,40,0.15);}

</style>
</head>
<body>
<div class="game" id="game">
  <div class="bg" id="bgel"></div>
  <div class="sky-tint" id="skytint"></div>
  <div class="overlay"></div>
  <div class="pop" id="pop1">❤️</div>
  <div class="pop" id="pop2" style="left:57%">⭐</div>

  <div class="stats">
    <div class="stat"><span class="sl">hunger</span><div class="bw"><div class="sb bf" id="bfood" style="width:70%"></div></div><span class="sv" id="vfood">70%</span></div>
    <div class="stat"><span class="sl">energy</span><div class="bw"><div class="sb bs" id="bsleep" style="width:80%"></div></div><span class="sv" id="vsleep">80%</span></div>
    <div class="stat"><span class="sl">love</span><div class="bw"><div class="sb bl" id="blove" style="width:60%"></div></div><span class="sv" id="vlove">60%</span></div>
  </div>

  <div class="timebadge" id="timebadge">🌙 00:00</div>
  <div class="mood" id="mood">feeling good ✨</div>
  <div class="bub" id="bub">hi!</div>

  <div class="fw floaty" id="fw">
    <img id="face" class="face" alt="chibi"/>
  </div>

  <div class="acts">
    <button class="ab" onclick="doFeed()"><span class="ic">🍖</span>feed</button>
    <button class="ab" id="slpbtn" onclick="doSleep()"><span class="ic">🌙</span>sleep</button>
    <button class="ab" onclick="doPlay()"><span class="ic">🎮</span>play</button>
    <button class="ab kiss-btn" onclick="doKiss()"><span class="ic">💋</span>kiss</button>
    <button class="ab beat-btn" onclick="doBeat()"><span class="ic">👊</span>beat</button>
    <button class="ab ach-btn" onclick="openAch()"><span class="ic">🏆</span>awards</button>
    <button class="ab diary-btn" onclick="openDiary()"><span class="ic">📖</span>diary</button>
  </div>

  <div class="diary-modal" id="diaryModal">
    <div class="diary-book">
      <div class="diary-header">
        <span class="diary-title">📖 my diary</span>
        <button class="diary-close" onclick="closeDiary()">✕</button>
      </div>
      <div class="diary-entries" id="diaryEntries">
        <div class="diary-empty">no entries yet...<br/>come back later!</div>
      </div>
    </div>
  </div>

<button class="chat-fab" onclick="openChat()">💬</button>
<div class="chat-modal" id="chatModal">
  <div class="chat-box">
    <div class="chat-header">
      <img class="chat-av" id="chatAv" alt=""/>
      <div><div class="chat-name">him</div><div class="chat-status" id="chatStatus">online</div></div>
      <button class="chat-close" onclick="closeChat()">&#10005;</button>
    </div>
    <div class="chat-msgs" id="chatMsgs"></div>
    <div class="chat-input-row">
      <input class="chat-input" id="chatInput" maxlength="200" onkeydown="if(event.key==='Enter')sendChat()"/>
      <button class="chat-send" id="chatSend" onclick="sendChat()">send</button>
    </div>
  </div>
</div>

</div>

const S={food:70,sleep:80,love:60,sleeping:false,_st:null,_lastEvent:null};
const diary=[];

// ── FAST IN-GAME CLOCK ───────────────────────────────────────
// 1 real second = 4 game minutes → full 24h day in 6 real minutes
const GAME_SPEED = 4;
let gameMinutes = 7 * 60; // start at 7:00am

const TIME_PERIODS = [
  {start:0,   end:360,  label:'🌙 night',  tint:'rgba(10,10,60,0.45)',    bright:0.62},
  {start:360, end:480,  label:'🌅 dawn',   tint:'rgba(255,120,40,0.18)',  bright:0.85},
  {start:480, end:1020, label:'☀️ day',    tint:'rgba(120,160,255,0.06)', bright:1.0},
  {start:1020,end:1200, label:'🌇 dusk',   tint:'rgba(255,80,20,0.22)',   bright:0.88},
  {start:1200,end:1440, label:'🌙 night',  tint:'rgba(10,10,60,0.38)',    bright:0.65},
];

function getTimePeriod(mins){
  return TIME_PERIODS.find(p=>mins>=p.start&&mins<p.end)||TIME_PERIODS[0];
}

function fmtTime(mins){
  const h=Math.floor(mins/60)%24;
  const m=mins%60;
  const ampm=h<12?'am':'pm';
  const h12=h%12||12;
  return h12+':'+(m<10?'0':'')+m+' '+ampm;
}

function tickClock(){
  gameMinutes=(gameMinutes+GAME_SPEED)%1440;
  const p=getTimePeriod(gameMinutes);
  document.getElementById('skytint').style.background=p.tint;
  document.getElementById('bgel').style.filter='brightness('+p.bright+')';
  document.getElementById('timebadge').textContent=p.label+' '+fmtTime(gameMinutes);
}
tickClock();
setInterval(tickClock,1000);

const diaryTemplates={
  great:["today was SO good. ate well, had energy and felt super loved. honestly? best day.","woke up feeling amazing. got fed on time, played a lot. couldn't ask for more fr.","i was so happy today. everything just went right. full belly, full heart."],
  good:["pretty good day overall. nothing crazy but i felt taken care of. that's enough.","had a nice day. ate, played a bit, got some rest. life is chill rn.","today was normal in a good way. no complaints honestly."],
  meh:["today was just... ok i guess. not great, not terrible. kinda just existed.","meh. could've been better. i was a little hungry and tired but survived.","wasn't the best day. felt a bit ignored. hoping tomorrow is better."],
  bad:["today was rough ngl. i was starving AND tired AND lonely. not a great combo.","i don't even want to talk about today. low energy, no food, no love. awful.","someone please feed me and hug me. today was genuinely terrible."],
  beaten:["got hit today. AGAIN. i am NOT okay. why would anyone do that to me 😤","today i was punched. i have recorded this in my diary as evidence.","i was beaten today. my love is at an all time low. i am in my villain era."],
  kissed:["got a kiss today 💋 i will not be elaborating further but i am blushing.","someone kissed me today... i replayed it in my head like 5 times.","today was a good day. there was a kiss involved. that's all i'm saying."],
  slept:["took a long nap today. woke up feeling like a new person honestly.","sleep was so good today. i needed that more than i realized.","napped for a while. energy fully restored. ready to take on the world."],
};
function getDiaryMood(){
  if(S._lastEvent==='beaten') return 'beaten';
  if(S._lastEvent==='kissed') return 'kissed';
  if(S._lastEvent==='slept')  return 'slept';
  const avg=(S.food+S.sleep+S.love)/3;
  if(avg>80) return 'great';
  if(avg>60) return 'good';
  if(avg>40) return 'meh';
  return 'bad';
}
function writeDiaryEntry(){
  const mood=getDiaryMood();
  const t=diaryTemplates[mood];
  const text=t[Math.floor(Math.random()*t.length)];
  diary.unshift({date:fmtTime(gameMinutes)+' (in-game)',text});
  if(diary.length>20)diary.pop();
  S._lastEvent=null;
}
function renderDiary(){
  const el=document.getElementById('diaryEntries');
  if(!diary.length){el.innerHTML='<div class="diary-empty">no entries yet...<br/>come back later!</div>';return;}
  el.innerHTML=diary.map(e=>`<div class="diary-entry"><div class="diary-date">${e.date}</div><div class="diary-text">${e.text}</div></div>`).join('');
}
function openDiary(){writeDiaryEntry();renderDiary();document.getElementById('diaryModal').classList.add('open');}
function closeDiary(){document.getElementById('diaryModal').classList.remove('open');}

// ── GAME LOGIC ────────────────────────────────────────────────
const msgs={feed:["nom nom!","yummy~","more pls!"],sleep:["zzz...","nighty ♥","so sleepy"],wake:["I'm up!","morning!","lets go!"],play:["yay!!","hehe~","so fun!"],kiss:["mwah! 💋","hehe~","blush~","uwu ♥"],hit:["OUCH! 😤","hey!!","stop it!","not cool!"]};
function rnd(a){return a[Math.floor(Math.random()*a.length)]}
function setBar(id,v){v=Math.max(0,Math.min(100,Math.round(v)));document.getElementById('b'+id).style.width=v+'%';document.getElementById('v'+id).textContent=v+'%';}
function showMsg(t){const b=document.getElementById('bub');b.textContent=t;b.classList.add('show');clearTimeout(b._t);b._t=setTimeout(()=>b.classList.remove('show'),7000);}
function setExpr(n){document.getElementById('face').src=IMGS[n]||IMGS.normal;}
function anim(cls,ms=520){const el=document.getElementById('fw');el.classList.remove('floaty','bouncing','shaking','pulsing');void el.offsetWidth;el.classList.add(cls);setTimeout(()=>{el.classList.remove(cls);if(!S.sleeping)el.classList.add('floaty');},ms);}
function popH(){const h=document.getElementById('pop1');h.classList.remove('go');void h.offsetWidth;h.classList.add('go');}
function popS(){const s=document.getElementById('pop2');s.classList.remove('go');void s.offsetWidth;s.classList.add('go');}
function updateMood(){
  const avg=(S.food+S.sleep+S.love)/3,tag=document.getElementById('mood');
  if(S.sleeping){tag.textContent='sleeping... 💤';return}
  if(S.food<25){tag.textContent='starving 😭';setExpr('sad');return}
  if(S.sleep<20){tag.textContent='exhausted 😞';setExpr('sad');return}
  if(S.love<20){tag.textContent='lonely 😔';setExpr('bored');return}
  if(avg>82){tag.textContent='super happy! ✨';setExpr('happy')}
  else if(avg>55){tag.textContent='feeling good ✨';setExpr('normal')}
  else{tag.textContent='meh... 😑';setExpr('bored')}
}
function doFeed(){if(S.sleeping){wakeUp();return}S.food=Math.min(100,S.food+22);setBar('food',S.food);setExpr('eating');popS();showMsg(rnd(msgs.feed));anim('bouncing');setTimeout(updateMood,900);trackFeed();}
function doSleep(){
  if(S.sleeping){wakeUp();return}
  S.sleeping=true;document.getElementById('fw').classList.remove('floaty');
  setExpr('sleeping');
  const btn=document.getElementById('slpbtn');
  btn.querySelector('.ic').textContent='☀️';btn.childNodes[1].textContent='wake';
  showMsg(rnd(msgs.sleep));document.getElementById('mood').textContent='sleeping... 💤';
  S._st=setInterval(()=>{if(!S.sleeping){clearInterval(S._st);return}S.sleep=Math.min(100,S.sleep+3);setBar('sleep',S.sleep);},800);
}
function wakeUp(){S.sleeping=false;clearInterval(S._st);S._lastEvent='slept';trackSleep();const btn=document.getElementById('slpbtn');btn.querySelector('.ic').textContent='🌙';btn.childNodes[1].textContent='sleep';showMsg(rnd(msgs.wake));anim('bouncing');updateMood();}
function doPlay(){if(S.sleeping){wakeUp();return}S.love=Math.min(100,S.love+20);S.sleep=Math.max(0,S.sleep-6);setBar('love',S.love);setBar('sleep',S.sleep);setExpr('happy');popH();showMsg(rnd(msgs.play));anim('bouncing');setTimeout(updateMood,900);trackPlay();}
function doKiss(){if(S.sleeping){wakeUp();return}S._lastEvent='kissed';S.love=Math.min(100,S.love+12);setBar('love',S.love);setExpr('kiss');popH();showMsg(rnd(msgs.kiss));anim('pulsing',400);setTimeout(updateMood,700);trackKiss();}
function doBeat(){if(S.sleeping){wakeUp();return}S._lastEvent='beaten';S.love=Math.max(0,S.love-15);S.food=Math.max(0,S.food-5);setBar('love',S.love);setBar('food',S.food);setExpr('angry');showMsg(rnd(msgs.hit));anim('shaking',450);setTimeout(updateMood,900);trackBeat();}
setInterval(()=>{if(!S.sleeping){S.food=Math.max(0,S.food-1.5);S.sleep=Math.max(0,S.sleep-1);S.love=Math.max(0,S.love-.8);setBar('food',S.food);setBar('sleep',S.sleep);setBar('love',S.love);updateMood();}},3000);

var chatHistory = [];

function openChat() {
  document.getElementById("chatModal").classList.add("open");
  document.getElementById("chatAv").src = document.getElementById("face").src;
  if (chatHistory.length === 0) {
    setTimeout(function() { addBotMsg(getGreeting()); }, 500);
  }
  document.getElementById("chatInput").focus();
}

  document.getElementById("chatModal").classList.remove("open");
}

function getGreeting() {
  var avg = (S.food + S.sleep + S.love) / 3;
  var h = Math.floor(gameMinutes / 60) % 24;
  if (S.sleeping) return "zzz... (wake me up first!)";
  if (h >= 5 && h < 12) {
    if (avg > 70) return "good morning!! feeling pretty good today";
    return "morning... still waking up honestly";
  }
  if (h >= 12 && h < 17) {
    if (S.food < 30) return "hey... can you feed me first im starving";
    return "hey! what's up?";
  }
  if (h >= 17 && h < 21) return "evening! how was your day?";
  return "oh you're still up? same honestly";
}

function buildSystemPrompt() {
  var avg = (S.food + S.sleep + S.love) / 3;
  var moodDesc;
  if (S.sleeping) { moodDesc = "currently asleep and groggy"; }
  else if (S.food < 25) { moodDesc = "very hungry and a bit cranky"; }
  else if (S.sleep < 20) { moodDesc = "exhausted, barely keeping eyes open"; }
  else if (S.love < 20) { moodDesc = "feeling lonely and craving attention"; }
  else if (avg > 80) { moodDesc = "in a great mood, energetic and happy"; }
  else if (avg > 55) { moodDesc = "feeling pretty good and chill"; }
  else { moodDesc = "feeling a bit blah"; }

  var h = Math.floor(gameMinutes / 60) % 24;
  var timeOfDay = h < 6 ? "late at night" : h < 12 ? "morning" : h < 17 ? "afternoon" : h < 21 ? "evening" : "night";

  return "You are a chibi character - a young guy with curly dark hair, round gold glasses, dark skin. You are the player's virtual pet and companion. Personality: laid-back, a little sarcastic but sweet, uses casual gen-z language, mostly lowercase, short sentences, occasional emoji (not too many). You sometimes reference how you feel physically based on your stats.\n\nCurrent time: " + timeOfDay + ". Your stats right now: Hunger " + Math.round(S.food) + "%, Energy " + Math.round(S.sleep) + "%, Love " + Math.round(S.love) + "%. You are " + moodDesc + ".\n\nReply in character. Keep it short, 1-4 sentences. No asterisks. No breaking character.";
}

function addBotMsg(text) {
  var box = document.getElementById("chatMsgs");
  var row = document.createElement("div");
  row.className = "msg-row bot";
  var av = document.createElement("img");
  av.className = "msg-av";
  av.src = document.getElementById("face").src;
  var bub = document.createElement("div");
  bub.className = "msg-bubble";
  bub.textContent = text;
  row.appendChild(av);
  row.appendChild(bub);
  box.appendChild(row);
  box.scrollTop = box.scrollHeight;
  chatHistory.push({ role: "assistant", content: text });
}

function addUserMsg(text) {
  var box = document.getElementById("chatMsgs");
  var row = document.createElement("div");
  row.className = "msg-row user";
  var av = document.createElement("div");
  av.className = "msg-av user-av";
  av.textContent = "\uD83E\uDDD1";
  var bub = document.createElement("div");
  bub.className = "msg-bubble";
  bub.textContent = text;
  row.appendChild(av);
  row.appendChild(bub);
  box.appendChild(row);
  box.scrollTop = box.scrollHeight;
  chatHistory.push({ role: "user", content: text });
}

function showTyping() {
  var box = document.getElementById("chatMsgs");
  var row = document.createElement("div");
  row.className = "msg-row bot";
  row.id = "typingRow";
  var av = document.createElement("img");
  av.className = "msg-av";
  av.src = document.getElementById("face").src;
  var bub = document.createElement("div");
  bub.className = "msg-bubble";
  bub.innerHTML = '<span class="typing-dot"></span><span class="typing-dot"></span><span class="typing-dot"></span>';
  row.appendChild(av);
  row.appendChild(bub);
  box.appendChild(row);
  box.scrollTop = box.scrollHeight;
}

function hideTyping() {
  var t = document.getElementById("typingRow");
  if (t) t.remove();
}

function sendChat() {
  if (chatBusy) return;
  var input = document.getElementById("chatInput");
  var text = input.value.trim();
  if (!text) return;
  input.value = "";
  addUserMsg(text);
  chatBusy = true;
  document.getElementById("chatSend").disabled = true;
  trackChat();
  document.getElementById("chatStatus").textContent = "typing...";
  showTyping();

  var msgs = chatHistory.slice(-12);

  fetch("https://api.anthropic.com/v1/messages", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514",
      max_tokens: 1000,
      system: buildSystemPrompt(),
      messages: msgs
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(data) {
    hideTyping();
    var reply = "...";
    if (data.content && data.content[0] && data.content[0].text) {
      reply = data.content[0].text;
    }
    addBotMsg(reply);
  })
  .catch(function() {
    hideTyping();
    addBotMsg("ugh my brain glitched... try again?");
  })
  .finally(function() {
    chatBusy = false;
    document.getElementById("chatSend").disabled = false;
    document.getElementById("chatStatus").textContent = "online";
  });
}

var SAVE_KEY = "chibi_save_v1";

function saveGame() {
  var data = {
    food: S.food,
    sleep: S.sleep,
    love: S.love,
    gameMinutes: gameMinutes,
    diary: diary,
    savedAt: Date.now()
  };
  try {
    localStorage.setItem(SAVE_KEY, JSON.stringify(data));
    var badge = document.getElementById("saveBadge");
    badge.classList.add("show");
    clearTimeout(badge._t);
    badge._t = setTimeout(function() { badge.classList.remove("show"); }, 2000);
  } catch(e) {}
}

function loadGame() {
  try {
    var raw = localStorage.getItem(SAVE_KEY);
    if (!raw) return;
    var data = JSON.parse(raw);
    // only load if saved less than 24 hours ago
    if (Date.now() - data.savedAt > 86400000) return;
    S.food  = typeof data.food  === "number" ? data.food  : 70;
    S.sleep = typeof data.sleep === "number" ? data.sleep : 80;
    S.love  = typeof data.love  === "number" ? data.love  : 60;
    gameMinutes = typeof data.gameMinutes === "number" ? data.gameMinutes : 7*60;
    if (Array.isArray(data.diary)) {
      data.diary.forEach(function(e) { diary.push(e); });
    }
    setBar("food",  S.food);
    setBar("sleep", S.sleep);
    setBar("love",  S.love);
    updateMood();
    showMsg("welcome back!");
  } catch(e) {}
}

// auto-save every 60 seconds
setInterval(saveGame, 60000);
// save on page close
window.addEventListener("beforeunload", saveGame);
// load on start
loadGame();

];

var achStats = {
  feedCount:0, sleepCount:0, kissCount:0, beatCount:0,
  playCount:0, diaryCount:0, chatCount:0, perfectCount:0,
  ashCount:0, spideyCount:0, peaceFeed:0
};
var achUnlocked = {};
var everBeaten = false;

function loadAch() {
  try {
    var raw = localStorage.getItem(ACH_KEY);
    if (!raw) return;
    var data = JSON.parse(raw);
    if (data.stats) Object.assign(achStats, data.stats);
    if (data.unlocked) Object.assign(achUnlocked, data.unlocked);
    if (data.everBeaten) everBeaten = data.everBeaten;
  } catch(e) {}
}

function saveAch() {
  try {
    localStorage.setItem(ACH_KEY, JSON.stringify({
      stats: achStats,
      unlocked: achUnlocked,
      everBeaten: everBeaten
    }));
  } catch(e) {}
}

function checkAch(statName) {
  ACHIEVEMENTS.forEach(function(a) {
    if (a.stat !== statName) return;
    if (achUnlocked[a.id]) return;
    if (achStats[a.stat] >= a.threshold) {
      achUnlocked[a.id] = true;
      showAchToast(a);
      saveAch();
    }
  });
}

function showAchToast(a) {
  var toast = document.getElementById("achToast");
  document.getElementById("achToastIcon").textContent = a.icon;
  document.getElementById("achToastName").textContent = a.name;
  toast.classList.add("show");
  clearTimeout(toast._t);
  toast._t = setTimeout(function() { toast.classList.remove("show"); }, 3500);
}

function trackFeed()  { achStats.feedCount++; if (!everBeaten) achStats.peaceFeed++; checkAch("feedCount"); checkAch("peaceFeed"); saveAch(); }
function trackSleep() { achStats.sleepCount++; checkAch("sleepCount"); saveAch(); }
function trackKiss()  { achStats.kissCount++; checkAch("kissCount"); saveAch(); }
function trackBeat()  { achStats.beatCount++; everBeaten = true; achStats.peaceFeed = 0; checkAch("beatCount"); saveAch(); }
function trackPlay()  { achStats.playCount++; checkAch("playCount"); saveAch(); }
function trackDiary() { achStats.diaryCount++; checkAch("diaryCount"); saveAch(); }
function trackChat()  { achStats.chatCount++; checkAch("chatCount"); saveAch(); }

function trackThoughtTopic(text) {
  var t = text.toLowerCase();
  if (t.indexOf("ashmeeta") !== -1) { achStats.ashCount++; checkAch("ashCount"); saveAch(); }
  if (t.indexOf("spiderman") !== -1 || t.indexOf("spiderverse") !== -1 || t.indexOf("spidey") !== -1) { achStats.spideyCount++; checkAch("spideyCount"); saveAch(); }
}

function trackPerfect() {
  if (S.food >= 90 && S.sleep >= 90 && S.love >= 90) {
    achStats.perfectCount++;
    checkAch("perfectCount");
    saveAch();
  }
}

function openAch() {
  renderAch();
  document.getElementById("achModal").classList.add("open");
}
function closeAch() { document.getElementById("achModal").classList.remove("open"); }

function renderAch() {
  var total = ACHIEVEMENTS.length;
  var unlocked = Object.keys(achUnlocked).length;
  document.getElementById("achCount").textContent = unlocked + " / " + total;
  document.getElementById("achList").innerHTML = ACHIEVEMENTS.map(function(a) {
    var isUnlocked = !!achUnlocked[a.id];
    var progress = achStats[a.stat] || 0;
    var pct = Math.min(100, Math.round((progress / a.threshold) * 100));
    return '<div class="ach-item ' + (isUnlocked ? "unlocked" : "locked") + '">' +
      '<div class="ach-item-icon">' + a.icon + '</div>' +
      '<div class="ach-item-info">' +
        '<span class="ach-item-name">' + a.name + '</span>' +
        '<span class="ach-item-desc">' + a.desc + '</span>' +
      '</div>' +
      '<div class="ach-item-badge">' + (isUnlocked ? "done!" : pct + "%") + '</div>' +
    '</div>';
  }).join("");
}

loadAch();
// check perfect every 10 seconds
setInterval(trackPerfect, 10000);
